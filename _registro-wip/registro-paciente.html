<!DOCTYPE html>
<html lang="es" data-lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoCM Camasca — Paciente</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .pat-header-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      margin-bottom: var(--space-5);
    }
    .pat-header-top { display: flex; align-items: baseline; gap: var(--space-4); flex-wrap: wrap; }
    .pat-header-name { font-size: var(--text-xl); font-weight: 700; color: var(--color-text); font-family: var(--font-display); }
    .pat-header-id { font-family: ui-monospace, monospace; color: var(--color-text-muted); font-size: var(--text-sm); }
    .pat-header-meta { display: flex; flex-wrap: wrap; gap: var(--space-4); margin-top: var(--space-3); font-size: var(--text-sm); color: var(--color-text-muted); }
    .pat-header-meta strong { color: var(--color-text); font-weight: 600; margin-right: 6px; }

    .pat-safety-banner {
      background: var(--color-error); color: white;
      padding: var(--space-3) var(--space-4); border-radius: var(--radius-md);
      margin-top: var(--space-3);
      display: flex; align-items: center; justify-content: space-between; gap: var(--space-3);
    }
    .pat-safety-banner button {
      background: white; color: var(--color-error);
      padding: 6px 12px; border-radius: var(--radius-md);
      font-weight: 700; font-size: var(--text-sm);
    }

    .sec-card {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); padding: var(--space-5);
      margin-bottom: var(--space-4);
    }
    .sec-card h2 {
      font-size: var(--text-lg); font-weight: 700; margin-bottom: var(--space-3);
      display: flex; justify-content: space-between; align-items: baseline;
      border-bottom: 1px solid var(--color-divider); padding-bottom: var(--space-2);
    }

    .trend-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: var(--space-3);
    }
    .trend-card {
      background: var(--color-surface-2); border: 1px solid var(--color-border);
      border-radius: var(--radius-md); padding: var(--space-3);
    }
    .trend-card h3 { font-size: var(--text-sm); font-weight: 700; display:flex;justify-content:space-between;align-items:center; }
    .trend-card h3 .tool-badge {
      font-family: ui-monospace, monospace; font-weight: 700; font-size: var(--text-xs);
      padding: 2px 8px; background: var(--color-primary-bg); color: var(--color-primary); border-radius: var(--radius-sm);
    }
    .trend-card .trend-score { font-size: var(--text-xl); font-weight: 700; font-family: var(--font-display); margin-top: var(--space-2); }
    .trend-card .trend-sub { font-size: var(--text-xs); color: var(--color-text-muted); }
    .trend-card .big-spark { width: 100%; height: 48px; margin-top: var(--space-2); }

    .visit-timeline { margin-top: var(--space-2); }
    .visit-row {
      display: grid;
      grid-template-columns: 100px 90px 1fr 60px 100px;
      gap: var(--space-3);
      padding: var(--space-2) 0;
      border-bottom: 1px solid var(--color-divider);
      font-size: var(--text-sm);
      align-items: center;
    }
    @media (max-width: 700px) {
      .visit-row { grid-template-columns: 1fr auto; grid-template-areas: 'date score' 'tool tier' 'note note'; }
      .visit-row .vdate { grid-area: date; }
      .visit-row .vtool { grid-area: tool; }
      .visit-row .vscore { grid-area: score; text-align: right; }
      .visit-row .vtier { grid-area: tier; justify-self: end; }
      .visit-row .vnote { grid-area: note; font-size: var(--text-xs); color: var(--color-text-muted); }
    }
    .visit-row:last-child { border: none; }
    .visit-row .vdate { color: var(--color-text-muted); font-family: ui-monospace, monospace; font-size: var(--text-xs); }
    .visit-row .vtool { font-family: ui-monospace, monospace; font-size: var(--text-xs); font-weight: 700; color: var(--color-primary); }
    .visit-row .vnote { color: var(--color-text); }
    .visit-row .vscore { font-family: ui-monospace, monospace; font-weight: 700; }
    .visit-row .vtier { font-size: var(--text-xs); font-weight: 700; padding: 2px 8px; border-radius: var(--radius-full); text-align: center; white-space: nowrap; }
    .tier-severe   { background: var(--color-error);  color: white; }
    .tier-moderate { background: var(--color-warning); color: white; }
    .tier-mild     { background: var(--color-primary); color: white; }
    .tier-remission { background: var(--color-success); color: white; }
    .tier-nodata   { background: var(--color-surface-offset-2); color: var(--color-text-muted); }

    .med-row {
      display: grid; grid-template-columns: 100px 1fr 80px 1fr 100px;
      gap: var(--space-3); padding: var(--space-2) 0;
      border-bottom: 1px solid var(--color-divider);
      font-size: var(--text-sm);
    }
    .med-row:last-child { border: none; }
    .med-row .mdate { color: var(--color-text-muted); font-family: ui-monospace, monospace; font-size: var(--text-xs); }
    .med-row .mmed { font-weight: 600; }
    .med-row .maction { font-size: var(--text-xs); text-transform: uppercase; font-weight: 700; color: var(--color-primary); }

    .prompt-card {
      background: oklch(from var(--color-primary) l c h / 0.06);
      border: 1px solid oklch(from var(--color-primary) l c h / 0.25);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
      margin-bottom: var(--space-2);
      font-size: var(--text-sm);
      color: var(--color-text);
    }
    .prompt-card strong { color: var(--color-primary); }
    .prompt-card .prompt-actions { margin-top: var(--space-2); display: flex; gap: var(--space-2); flex-wrap: wrap; }
    .prompt-card button {
      padding: 4px 10px; font-size: var(--text-xs); font-weight: 600;
      border-radius: var(--radius-md);
    }

    .tool-launch-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: var(--space-2);
    }
    .tool-launch-btn {
      padding: var(--space-2) var(--space-3);
      background: var(--color-surface-offset); border: 1px solid var(--color-border);
      border-radius: var(--radius-md); font-size: var(--text-xs); font-weight: 600;
      text-decoration: none; color: var(--color-text); text-align: center;
      transition: background var(--transition-interactive);
    }
    .tool-launch-btn:hover { background: var(--color-primary-bg); color: var(--color-primary); border-color: var(--color-primary); }

    .quick-actions { display: flex; gap: var(--space-2); flex-wrap: wrap; margin-top: var(--space-3); }
    .quick-actions button {
      padding: var(--space-2) var(--space-4); border-radius: var(--radius-md);
      font-size: var(--text-sm); font-weight: 600;
    }
    .quick-actions .primary { background: var(--color-primary); color: white; border: none; }
    .quick-actions .ghost { background: transparent; border: 1px solid var(--color-border); color: var(--color-text); }
    .quick-actions .danger { background: var(--color-error); color: white; border: none; }
  </style>
</head>
<body>

<div class="app-layout no-sidebar">
  <main class="main-content">

    <div class="topbar">
      <div style="display:flex; align-items:center; gap:var(--space-3);">
        <a href="registro.html" class="ghost" style="padding:6px 10px;border:1px solid var(--color-border);border-radius:var(--radius-md);color:var(--color-text-muted);text-decoration:none;font-size:var(--text-sm);">← <span data-es="Registro" data-en="Registry">Registro</span></a>
        <div>
          <div class="topbar-title" id="patTopbarName">—</div>
          <div class="topbar-subtitle" id="patTopbarId">—</div>
        </div>
      </div>
      <div class="topbar-actions">
        <div class="lang-toggle">
          <button class="lang-btn active" id="btnES" onclick="setLang('es')">Español</button>
          <button class="lang-btn" id="btnEN" onclick="setLang('en')">English</button>
        </div>
        <button class="theme-toggle" data-theme-toggle aria-label="Cambiar tema">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="page-content">
      <div id="patBody">
        <div class="empty-state"><p>Cargando…</p></div>
      </div>
    </div>
  </main>
</div>

<!-- Log Visit Modal -->
<div class="modal-backdrop" id="visitModal" style="display:none;">
  <div class="modal" style="max-width:640px;">
    <div class="modal-header">
      <h3 data-es="Registrar visita" data-en="Log visit">Registrar visita</h3>
      <button class="modal-close" onclick="closeVisitModal()">×</button>
    </div>
    <div class="modal-body" id="visitForm"></div>
    <div class="modal-footer">
      <button class="ghost" onclick="closeVisitModal()" data-es="Cancelar" data-en="Cancel">Cancelar</button>
      <button class="primary" onclick="submitVisit()" data-es="Guardar" data-en="Save">Guardar</button>
    </div>
  </div>
</div>

<!-- Log Medication Modal -->
<div class="modal-backdrop" id="medModal" style="display:none;">
  <div class="modal" style="max-width:640px;">
    <div class="modal-header">
      <h3 data-es="Registrar medicamento" data-en="Log medication">Registrar medicamento</h3>
      <button class="modal-close" onclick="closeMedModal()">×</button>
    </div>
    <div class="modal-body" id="medForm"></div>
    <div class="modal-footer">
      <button class="ghost" onclick="closeMedModal()" data-es="Cancelar" data-en="Cancel">Cancelar</button>
      <button class="primary" onclick="submitMed()" data-es="Guardar" data-en="Save">Guardar</button>
    </div>
  </div>
</div>

<style>
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 200; padding: var(--space-4); }
  .modal { background: var(--color-surface); border-radius: var(--radius-lg); width: 100%; max-height: 90vh; overflow-y: auto; border: 1px solid var(--color-border); box-shadow: var(--shadow-lg); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: var(--space-4) var(--space-5); border-bottom: 1px solid var(--color-border); }
  .modal-header h3 { font-size: var(--text-lg); font-weight: 700; color: var(--color-text); }
  .modal-close { background: transparent; border: none; font-size: 1.6rem; color: var(--color-text-muted); cursor: pointer; line-height: 1; }
  .modal-body { padding: var(--space-5); }
  .modal-footer { padding: var(--space-3) var(--space-5); display: flex; gap: var(--space-2); justify-content: flex-end; border-top: 1px solid var(--color-border); }
  .modal-footer button { padding: var(--space-2) var(--space-4); border-radius: var(--radius-md); font-weight: 600; font-size: var(--text-sm); }
  .modal-footer button.primary { background: var(--color-primary); color: white; border: none; }
  .modal-footer button.ghost { background: transparent; border: 1px solid var(--color-border); color: var(--color-text); }
</style>

<script src="registro-data.js"></script>
<script src="registro-paciente.js"></script>
</body>
</html>
