<!DOCTYPE html>
<html lang="es" data-lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoCM Camasca — Sugerencias</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .sug-wrap { max-width: 720px; margin: 0 auto; }
    .sug-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--space-5); margin-bottom: var(--space-4); }
    .sug-card h2 { font-size: var(--text-lg); font-weight: 700; margin-bottom: var(--space-3); }
    .sug-field { margin-bottom: var(--space-3); }
    .sug-field label { display: block; font-size: var(--text-xs); color: var(--color-text-muted); font-weight: 600; text-transform: uppercase; margin-bottom: 4px; }
    .sug-field input, .sug-field select, .sug-field textarea {
      width: 100%; padding: 8px 10px;
      background: var(--color-surface-2); border: 1px solid var(--color-border);
      border-radius: var(--radius-md); color: var(--color-text);
      font-family: inherit; font-size: var(--text-sm);
    }
    .sug-field textarea { resize: vertical; min-height: 120px; }
    .sug-radio-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .sug-radio-group label {
      padding: 6px 14px; background: var(--color-surface-offset);
      border-radius: var(--radius-full); font-size: var(--text-sm);
      cursor: pointer; color: var(--color-text);
      border: 1px solid transparent;
    }
    .sug-radio-group input { display: none; }
    .sug-radio-group input:checked + span {
      background: var(--color-primary); color: white;
      padding: 6px 14px; border-radius: var(--radius-full); display: inline-block;
    }
    .sug-radio-group label:has(input:checked) {
      background: var(--color-primary); color: white; border-color: var(--color-primary);
    }
    .submit-row { display: flex; justify-content: flex-end; gap: var(--space-2); margin-top: var(--space-4); }
    .submit-row button { padding: var(--space-2) var(--space-5); border-radius: var(--radius-md); font-weight: 600; font-size: var(--text-sm); }
    .submit-row button.primary { background: var(--color-primary); color: white; border: none; }
    .submit-row button.ghost { background: transparent; border: 1px solid var(--color-border); color: var(--color-text); }
    .toast {
      position: fixed; bottom: 30px; right: 30px;
      background: var(--color-success); color: white; padding: 12px 20px;
      border-radius: var(--radius-md); box-shadow: var(--shadow-lg);
      display: none; font-weight: 600;
    }
    .toast.show { display: block; }
    .existing-sug {
      background: var(--color-surface-2); border: 1px solid var(--color-border);
      border-radius: var(--radius-md); padding: var(--space-3) var(--space-4);
      margin-bottom: var(--space-2);
      display: grid; grid-template-columns: 110px 1fr 90px; gap: var(--space-3); align-items: baseline; font-size: var(--text-sm);
    }
    .sug-cat-pill { font-size: var(--text-xs); font-weight: 700; padding: 2px 8px; border-radius: var(--radius-full); background: var(--color-primary-bg); color: var(--color-primary); }
    .sug-status-open { color: var(--color-warning); font-weight: 600; }
    .sug-status-done { color: var(--color-success); font-weight: 600; }
  </style>
</head>
<body>

<div class="app-layout no-sidebar">
  <main class="main-content">
    <div class="topbar">
      <div style="display:flex; align-items:center; gap:var(--space-3);">
        <a href="registro.html" class="ghost" style="padding:6px 10px;border:1px solid var(--color-border);border-radius:var(--radius-md);color:var(--color-text-muted);text-decoration:none;font-size:var(--text-sm);">← <span data-es="Registro" data-en="Registry">Registro</span></a>
        <div>
          <div class="topbar-title" data-es="Sugerencias y solicitudes" data-en="Suggestions and requests">Sugerencias y solicitudes</div>
          <div class="topbar-subtitle" data-es="Reporte errores, pida mejoras, comparta ideas" data-en="Report bugs, request features, share ideas">Reporte errores, pida mejoras, comparta ideas</div>
        </div>
      </div>
      <div class="topbar-actions">
        <div class="lang-toggle">
          <button class="lang-btn active" id="btnES" onclick="setLang('es')">Español</button>
          <button class="lang-btn" id="btnEN" onclick="setLang('en')">English</button>
        </div>
        <button class="theme-toggle" data-theme-toggle aria-label="Cambiar tema">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="page-content">
      <div class="sug-wrap">

        <div class="sug-card">
          <h2 data-es="Nueva sugerencia" data-en="New suggestion">Nueva sugerencia</h2>

          <div class="sug-field">
            <label data-es="Quién envía" data-en="Submitter">Quién envía</label>
            <select id="sSubmitter"><option value="">—</option></select>
          </div>

          <div class="sug-field">
            <label data-es="Categoría" data-en="Category">Categoría</label>
            <div class="sug-radio-group" id="sCategory">
              <label><input type="radio" name="scat" value="bug"/><span data-es="Error" data-en="Bug">Error</span></label>
              <label><input type="radio" name="scat" value="feature"/><span data-es="Función nueva" data-en="New feature">Función nueva</span></label>
              <label><input type="radio" name="scat" value="data"/><span data-es="Dato incorrecto" data-en="Data issue">Dato incorrecto</span></label>
              <label><input type="radio" name="scat" value="workflow"/><span data-es="Flujo de trabajo" data-en="Workflow">Flujo de trabajo</span></label>
              <label><input type="radio" name="scat" value="content"/><span data-es="Contenido / traducción" data-en="Content / translation">Contenido / traducción</span></label>
              <label><input type="radio" name="scat" value="other"/><span data-es="Otro" data-en="Other">Otro</span></label>
            </div>
          </div>

          <div class="sug-field">
            <label data-es="Prioridad" data-en="Priority">Prioridad</label>
            <div class="sug-radio-group" id="sPriority">
              <label><input type="radio" name="spri" value="urgent"/><span data-es="Urgente" data-en="Urgent">Urgente</span></label>
              <label><input type="radio" name="spri" value="high"/><span data-es="Alta" data-en="High">Alta</span></label>
              <label><input type="radio" name="spri" value="normal" checked/><span data-es="Normal" data-en="Normal">Normal</span></label>
              <label><input type="radio" name="spri" value="low"/><span data-es="Baja" data-en="Low">Baja</span></label>
            </div>
          </div>

          <div class="sug-field">
            <label data-es="Descripción" data-en="Description">Descripción</label>
            <textarea id="sDesc" data-es-placeholder="Describa el problema o idea con detalle…" data-en-placeholder="Describe the issue or idea in detail…" placeholder="Describa el problema o idea con detalle…"></textarea>
          </div>

          <div class="sug-field">
            <label data-es="Captura de pantalla (opcional)" data-en="Screenshot (optional)">Captura de pantalla (opcional)</label>
            <input type="file" id="sFile" accept="image/*"/>
            <p style="font-size: var(--text-xs); color: var(--color-text-muted); margin-top: 4px;" data-es="La captura se sube a Google Drive al enviar." data-en="The screenshot is uploaded to Google Drive on submit.">La captura se sube a Google Drive al enviar.</p>
          </div>

          <div class="submit-row">
            <button class="ghost" onclick="clearForm()" data-es="Limpiar" data-en="Clear">Limpiar</button>
            <button class="primary" onclick="submitSuggestion()" data-es="Enviar" data-en="Submit">Enviar</button>
          </div>
        </div>

        <div class="sug-card">
          <h2 data-es="Sugerencias recientes" data-en="Recent suggestions">Sugerencias recientes</h2>
          <div id="sugList">
            <p style="color:var(--color-text-muted);" data-es="Cargando…" data-en="Loading…">Cargando…</p>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<div class="toast" id="toast"></div>

<script src="registro-data.js"></script>
<script>
// ── Language toggle ───────────────────────────────────────────
function setLang(lang) {
  document.documentElement.setAttribute('data-lang', lang);
  document.documentElement.setAttribute('lang', lang);
  localStorage.setItem('coCMCamasca.lang', lang);
  const isEN = lang === 'en';
  document.querySelectorAll('[data-es]').forEach(el => {
    const es = el.getAttribute('data-es'), en = el.getAttribute('data-en');
    if (en) el.textContent = isEN ? en : es;
  });
  document.querySelectorAll('[data-es-placeholder]').forEach(el => {
    const es = el.getAttribute('data-es-placeholder'), en = el.getAttribute('data-en-placeholder');
    if (en) el.placeholder = isEN ? en : es;
  });
  const btnES = document.getElementById('btnES'), btnEN = document.getElementById('btnEN');
  if (btnES) btnES.classList.toggle('active', !isEN);
  if (btnEN) btnEN.classList.toggle('active', isEN);
}

// ── Theme ───────────────────────────────────────────────────────
(function initTheme() {
  const saved = localStorage.getItem('coCMCamasca.theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
  document.addEventListener('click', (e) => {
    if (e.target.closest('[data-theme-toggle]')) {
      const cur = document.documentElement.getAttribute('data-theme') || 'light';
      const next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('coCMCamasca.theme', next);
    }
  });
})();

let SUG_STATE = { team: [], suggestions: [] };

async function load() {
  const [config, suggestions] = await Promise.all([
    fetchTab('Config'),
    fetchTab('Sugerencias').catch(()=>[])
  ]);
  SUG_STATE.team = config.filter(r => r.Category==='team' && r.Active==='TRUE').map(r => r.Key);
  SUG_STATE.suggestions = suggestions;
  const sel = document.getElementById('sSubmitter');
  const savedUser = localStorage.getItem(REG_LS.USER);
  sel.innerHTML = '<option value="">—</option>' + SUG_STATE.team.map(n => `<option value="${n}" ${n===savedUser?'selected':''}>${n}</option>`).join('');
  renderSugList();
}

function renderSugList() {
  const lang = document.documentElement.getAttribute('data-lang') || 'es';
  const list = SUG_STATE.suggestions.slice().sort((a,b)=>String(b.Timestamp).localeCompare(String(a.Timestamp)));
  const el = document.getElementById('sugList');
  if (!list.length) {
    el.innerHTML = `<p style="color:var(--color-text-muted);">${lang==='en'?'No suggestions yet.':'Sin sugerencias aún.'}</p>`;
    return;
  }
  el.innerHTML = list.slice(0, 20).map(s => `
    <div class="existing-sug">
      <div style="font-family: ui-monospace, monospace; font-size: var(--text-xs); color: var(--color-text-muted);">${String(s.Timestamp||'').slice(0,10)}</div>
      <div>
        <span class="sug-cat-pill">${s.Category||'—'}</span>
        <strong style="margin-left: 8px;">${escapeHtml(s.Submitter||'—')}</strong>
        <div style="margin-top: 4px; font-size: var(--text-sm);">${escapeHtml(s.Description||'').slice(0,200)}</div>
      </div>
      <div class="${s.Status==='open'||s.Status===''?'sug-status-open':'sug-status-done'}">${s.Status||'open'}</div>
    </div>
  `).join('');
}

function clearForm() {
  document.getElementById('sDesc').value = '';
  document.querySelectorAll('#sCategory input').forEach(i => i.checked = false);
  document.getElementById('sFile').value = '';
}

async function submitSuggestion() {
  const submitter = document.getElementById('sSubmitter').value;
  const category  = document.querySelector('input[name=scat]:checked')?.value;
  const priority  = document.querySelector('input[name=spri]:checked')?.value || 'normal';
  const desc      = document.getElementById('sDesc').value.trim();
  const file      = document.getElementById('sFile').files[0];
  const lang      = document.documentElement.getAttribute('data-lang') || 'es';

  if (!submitter) return alert(lang==='en'?'Please select who you are.':'Seleccione quién envía.');
  if (!category)  return alert(lang==='en'?'Please pick a category.':'Seleccione una categoría.');
  if (!desc)      return alert(lang==='en'?'Please enter a description.':'Ingrese una descripción.');

  // File → base64 for Apps Script upload
  let attachmentData = '';
  let attachmentName = '';
  if (file) {
    attachmentData = await fileToBase64(file);
    attachmentName = file.name;
  }

  const now = new Date().toISOString();
  const row = {
    Suggestion_ID: `S-${Date.now()}`,
    Timestamp: now,
    Submitter: submitter,
    Category: category,
    Priority: priority,
    Description: desc,
    Attachment_URL: '',  // filled in by Apps Script after Drive upload
    Status: 'open',
    Resolution_Notes: '',
    Resolved_By: '',
    Resolved_At: '',
  };

  const url = cfgGet(REG_LS.APPS_SCRIPT_URL);
  if (url && file) {
    // Send through Apps Script with attachment
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type':'text/plain;charset=utf-8' },
      body: JSON.stringify({ op:'suggestion', row, attachmentData, attachmentName }),
    });
    await res.json();
  } else {
    await writeRow('Sugerencias', row);
  }
  SUG_STATE.suggestions.unshift(row);
  clearForm();
  toast(lang==='en'?'Submitted — thank you':'Enviado — gracias');
  renderSugList();
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(String(r.result).split(',')[1] || '');
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function escapeHtml(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

document.addEventListener('DOMContentLoaded', () => {
  const savedLang = localStorage.getItem('coCMCamasca.lang') || 'es';
  setLang(savedLang);
  load();
});
</script>

</body>
</html>
