<!DOCTYPE html>
<html lang="es" data-lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoCM Camasca — Paciente</title>
  <link rel="stylesheet" href="style.css?v=3b0fbf3" />
  <style>
    /* ── User-adjustable zoom (A− / A+) ── */
    .app-layout.no-sidebar { zoom: var(--reg-scale, 1); }

    /* ── Topbar: fixed so it never scrolls off screen ── */
    .topbar {
      position: fixed !important;
      top: 0;
      left: 0;
      right: 0;
      width: 100%;
      z-index: 200;
      box-sizing: border-box;
    }
    /* Push content below the fixed topbar */
    .main-content { padding-top: 56px; }
    /* ── Topbar compaction (match registry page) ── */
    .topbar-title { font-size: 16px !important; }
    .topbar-subtitle { font-size: 12px !important; }
    .lang-btn { font-size: 11px !important; padding: 3px 10px !important; }
    @media (max-width: 768px) {
      .topbar { flex-wrap: wrap; gap: 6px; padding: 10px 14px !important; overflow: visible; }
      .topbar-actions { gap: 6px; flex-shrink: 0; flex-wrap: wrap; }
      .topbar-subtitle { display: none; }
      html, body { overflow-x: hidden !important; }
      .main-content { padding-top: 70px; }
    }
    .howto-card summary { font-size: 12.5px !important; }

    /* ── Global compact typography (match registry page) ── */
    .app-layout.no-sidebar .page-content { font-size: 12.5px; }
    .app-layout.no-sidebar .page-content button,
    .app-layout.no-sidebar .page-content input,
    .app-layout.no-sidebar .page-content select,
    .app-layout.no-sidebar .page-content textarea,
    .app-layout.no-sidebar .page-content label,
    .app-layout.no-sidebar .page-content p,
    .app-layout.no-sidebar .page-content li,
    .app-layout.no-sidebar .page-content a { font-size: 12.5px; }
    .app-layout.no-sidebar .page-content h1 { font-size: 20px; line-height: 1.2; margin: 4px 0; }
    .app-layout.no-sidebar .page-content h2 { font-size: 15px; line-height: 1.25; margin: 6px 0; }
    .app-layout.no-sidebar .page-content h3 { font-size: 13px; line-height: 1.3; margin: 4px 0; }
    .app-layout.no-sidebar .page-content .howto-body,
    .app-layout.no-sidebar .page-content .howto-body li,
    .app-layout.no-sidebar .page-content .howto-body strong { font-size: 11.5px; line-height: 1.4; }

    /* ── Patient-page specific overrides: force all cards to match compact sizing ── */
    .pat-header-card { padding: 12px 14px; margin-bottom: 12px; }
    .pat-header-name { font-size: 18px !important; }
    .pat-header-id { font-size: 12px !important; }
    .pat-header-meta { font-size: 12px !important; gap: 12px !important; margin-top: 6px !important; }
    .pat-safety-banner { font-size: 12.5px; padding: 8px 12px; }
    .pat-safety-banner button { font-size: 12px !important; padding: 4px 10px !important; }
    .sec-card { padding: 12px 14px; margin-bottom: 10px; }
    .sec-card h2 { font-size: 14px !important; margin-bottom: 8px !important; padding-bottom: 6px !important; }
    .cocm-label { font-size: 10.5px !important; }
    .cocm-value { font-size: 12.5px !important; }
    .cocm-actions .ghost.sm { font-size: 11px !important; padding: 3px 8px !important; }
    .flag-review { font-size: 10.5px !important; padding: 1px 6px !important; }
    .trend-card { padding: 8px 10px; }
    .trend-card h3 { font-size: 12.5px !important; }
    .trend-card h3 .tool-badge { font-size: 10.5px !important; padding: 1px 6px !important; }
    .trend-card .trend-score { font-size: 18px !important; margin-top: 4px !important; }
    .trend-card .trend-sub { font-size: 10.5px !important; }
    .visit-row { font-size: 12px !important; padding: 4px 0 !important; }
    .visit-row .vdate, .visit-row .vtool, .visit-row .vtier { font-size: 10.5px !important; }
    .med-row { font-size: 12px !important; padding: 2px 0 !important; gap: 6px !important; }
    .med-row .mdate, .med-row .maction, .med-row .mpresc, .med-row .mnotes { font-size: 10.5px !important; }
    .prompt-card { font-size: 12px !important; padding: 8px 12px !important; margin-bottom: 6px !important; }
    .prompt-card button { font-size: 11px !important; padding: 3px 8px !important; }
    .tool-launch-btn { font-size: 11px !important; padding: 4px 8px !important; }
    .quick-actions button { font-size: 12px !important; padding: 6px 12px !important; }
    .np-label { font-size: 10.5px !important; }
    .safety-first-box { padding: 8px 10px; margin-bottom: 8px; }
    .safety-first-box label { font-size: 12.5px !important; }
    .safety-first-box .safety-note { font-size: 10.5px !important; }
    .last-visit-nudge { font-size: 11px !important; padding: 4px 8px !important; margin-bottom: 8px !important; }

    .pat-header-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 10px 14px;
      margin-bottom: 8px;
    }
    .pat-header-top { display: flex; align-items: baseline; gap: var(--space-4); flex-wrap: wrap; }
    .pat-header-name { font-size: var(--text-xl); font-weight: 700; color: var(--color-text); font-family: var(--font-display); }
    .pat-header-id { font-family: ui-monospace, monospace; color: var(--color-text-muted); font-size: var(--text-sm); }
    .pat-header-meta { display: flex; flex-wrap: wrap; gap: var(--space-4); margin-top: 4px; font-size: var(--text-sm); color: var(--color-text-muted); }
    .pat-header-meta strong { color: var(--color-text); font-weight: 600; margin-right: 6px; }

    .pat-safety-banner {
      background: var(--color-error); color: white;
      padding: 6px 12px; border-radius: var(--radius-md);
      margin-top: 6px;
      display: flex; align-items: center; justify-content: space-between; gap: var(--space-3);
    }
    .pat-safety-banner button {
      background: white; color: var(--color-error);
      padding: 6px 12px; border-radius: var(--radius-md);
      font-weight: 700; font-size: var(--text-sm);
    }

    .sec-card {
      background: var(--color-surface); border: 1px solid var(--color-border);
      border-radius: var(--radius-lg); padding: 10px 14px;
      margin-bottom: 8px;
    }
    .sec-card h2 {
      font-size: var(--text-lg); font-weight: 700; margin-bottom: 6px;
      display: flex; justify-content: space-between; align-items: baseline;
      border-bottom: 1px solid var(--color-divider); padding-bottom: 4px;
    }

    .trend-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: var(--space-2);
    }

    /* ── CoCM tracking card rows ── */
    .cocm-grid { display: flex; flex-direction: column; gap: 0; }
    .cocm-row {
      display: grid; grid-template-columns: minmax(180px, 1fr) 2fr auto;
      gap: var(--space-3); align-items: center;
      padding: 3px 0;
      border-bottom: 1px solid var(--color-divider);
    }
    .cocm-row:last-child { border-bottom: none; }
    .cocm-label {
      font-size: var(--text-xs); font-weight: 600;
      color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.04em;
    }
    .cocm-value { font-size: var(--text-xs); line-height: 1.35; }
    .cocm-actions { display: flex; gap: 4px; }
    .cocm-actions .ghost.sm {
      padding: 4px 10px; font-size: var(--text-xs); font-weight: 600;
    }
    .cell-empty { color: var(--color-text-faint, var(--color-text-muted)); }
    .flag-review {
      font-size: var(--text-xs); font-weight: 700;
      padding: 2px 8px;
      background: #e6f0fa; color: #1a5a9e;
      border-radius: var(--radius-full);
      white-space: nowrap; display: inline-block;
    }
    /* ── v2.5.5 additional trims ── */
    /* Date + ago (e.g. "[2026-04-21] · today") inside cocm rows */
    .cocm-row .cocm-value strong { font-size: 11px !important; font-weight: 600 !important; }
    .cocm-row .cocm-value span { font-size: 10px !important; }
    /* Prompt card body text ("Opens the tool on the CoCM portal…") */
    .prompt-card { font-size: 10.5px !important; line-height: 1.4 !important; padding: 6px 10px !important; }
    .prompt-card button { font-size: 11px !important; padding: 3px 10px !important; }
    /* ── v2.5.4 text-size trims (user-selected) ── */
    /* #4: "Conditions:" label only — chips stay at current size */
    .pat-header-card .cond-label {
      font-size: 10.5px !important;
      letter-spacing: 0.04em;
    }
    /* "Notes: [text]" line — shrink more than conditions (both label + data) */
    .pat-header-card .pat-notes-line {
      font-size: 11.5px !important;
      line-height: 1.4;
    }
    .pat-header-card .pat-notes-line strong {
      font-size: 10.5px !important;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    /* #6: Safety + Brigade banners — tighten on desktop too */
    .pat-safety-banner {
      font-size: 12.5px !important;
      padding: 8px 14px !important;
    }
    .pat-safety-banner button {
      font-size: 11.5px !important;
      padding: 4px 10px !important;
    }
    .pat-brigade-banner {
      font-size: 12.5px !important;
      padding: 8px 14px !important;
    }
    /* #7: last-visit-nudge in header top-right */
    .pat-header-top > span:last-child {
      font-size: 10.5px !important;
    }
    /* Registry back button — style matches CoCM Tools Portal (inline style on element) */
    /* To-do card — all text shrinks EXCEPT the h2 title */
    #todoCard p,
    #todoCard .todo-text,
    #todoCard #todoInput,
    #todoCard button,
    #todoCard #todoList span {
      font-size: 11.5px !important;
    }
    #todoCard #todoInput,
    #todoCard button[onclick="addTodo()"] {
      padding: 6px 10px !important;
    }

    @media (max-width: 600px) {
      .cocm-row { grid-template-columns: 1fr; gap: 2px; }
      .cocm-label { margin-top: var(--space-2); }
    }
    .trend-card {
      background: var(--color-surface-2); border: 1px solid var(--color-border);
      border-radius: var(--radius-md); padding: 8px 12px;
    }
    .trend-card h3 { font-size: var(--text-sm); font-weight: 700; display:flex;justify-content:space-between;align-items:center; }
    .trend-card h3 .tool-badge {
      font-family: ui-monospace, monospace; font-weight: 700; font-size: var(--text-xs);
      padding: 2px 8px; background: var(--color-primary-bg); color: var(--color-primary); border-radius: var(--radius-sm);
    }
    .trend-card .trend-score { font-size: var(--text-xl); font-weight: 700; font-family: var(--font-display); margin-top: 2px; }
    .trend-card .trend-sub { font-size: var(--text-xs); color: var(--color-text-muted); }
    .trend-card .big-spark { width: 100%; height: auto; margin-top: 4px; }

    .visit-timeline { margin-top: var(--space-2); }
    .visit-row {
      display: grid;
      grid-template-columns: 94px 62px 90px 1fr 60px 100px 28px;
      gap: var(--space-3);
      padding: 3px 0;
      border-bottom: 1px solid var(--color-divider);
      font-size: var(--text-sm);
      align-items: center;
    }
    @media (max-width: 700px) {
      .visit-row { grid-template-columns: 1fr auto; grid-template-areas: 'date score' 'type tier' 'tool tier' 'note note'; }
      .visit-row .vdate { grid-area: date; }
      .visit-row .vtype { grid-area: type; }
      .visit-row .vtool { grid-area: tool; }
      .visit-row .vscore { grid-area: score; text-align: right; }
      .visit-row .vtier { grid-area: tier; justify-self: end; }
      .visit-row .vnote { grid-area: note; font-size: var(--text-xs); color: var(--color-text-muted); }
      /* v2.5.2 mobile fix: 2-col grid has no slot for the header-row's 7 cells
         — hide the header row on mobile. The data rows are self-labeling via
         chip + tier color, so we don't lose signal. */
      .visit-row.visit-row-header { display: none !important; }
      /* Edit button has no grid area on mobile — tuck it inline at end of note row */
      .visit-row .vedit-btn { grid-area: note; justify-self: end; margin-top: -22px; opacity: 0.6; }
    }
    .visit-row:last-child { border: none; }
    .visit-row.visit-row-score { opacity: 0.85; }
    .visit-row .vdate { color: var(--color-text-muted); font-family: ui-monospace, monospace; font-size: var(--text-xs); }
    .visit-row .vtool { font-family: ui-monospace, monospace; font-size: var(--text-xs); font-weight: 700; color: var(--color-primary); }
    .visit-row .vnote { color: var(--color-text); }
    .visit-row .vscore { font-family: ui-monospace, monospace; font-weight: 700; }
    .visit-row .vtier { font-size: var(--text-xs); font-weight: 700; padding: 2px 8px; border-radius: var(--radius-full); text-align: center; white-space: nowrap; }
    .entry-type-chip { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: var(--radius-full); text-transform: uppercase; letter-spacing: 0.02em; display: inline-block; }
    .entry-type-chip.type-visit { background: var(--color-primary-bg); color: var(--color-primary); }
    .entry-type-chip.type-score { background: var(--color-surface-offset); color: var(--color-text-muted); border: 1px dashed var(--color-border); }
    .brigade-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: var(--radius-full); font-size: var(--text-xs); font-weight: 700; background: oklch(from var(--color-warning) l c h / 0.12); color: var(--color-warning); border: 1px solid oklch(from var(--color-warning) l c h / 0.35); }
    button.brigade-active { background: var(--color-warning); color: #fff; border: none; padding: var(--space-2) var(--space-4); border-radius: var(--radius-md); font-weight: 600; cursor: pointer; }
    .todo-row { display: flex; align-items: center; gap: 10px; padding: 6px 8px; background: var(--color-surface-2); border-radius: var(--radius-sm); }
    .todo-row .todo-text { font-size: var(--text-sm); color: var(--color-text); }
    .tier-severe   { background: var(--color-error);  color: white; }
    .tier-moderate { background: var(--color-warning); color: white; }
    .tier-mild     { background: var(--color-primary); color: white; }
    .tier-remission { background: var(--color-success); color: white; }
    .tier-nodata   { background: var(--color-surface-offset-2); color: var(--color-text-muted); }

    .med-row {
      display: grid; grid-template-columns: 90px 1fr 70px 1fr 90px;
      gap: var(--space-2); padding: 2px 0;
      border-bottom: 1px solid var(--color-divider);
      font-size: var(--text-sm);
      align-items: baseline;
    }
    .med-row:last-child { border: none; }
    .med-row .mdate { color: var(--color-text-muted); font-family: ui-monospace, monospace; font-size: var(--text-xs); }
    .med-row .mmed { font-weight: 600; }
    .med-row .maction { font-size: var(--text-xs); text-transform: uppercase; font-weight: 700; color: var(--color-primary); }
    .med-row .mpresc { font-size: var(--text-xs); color: var(--color-text-muted); }
    .med-row .mnotes { font-size: var(--text-xs); color: var(--color-text-muted); font-style: italic; margin-top: 1px; }

    .prompt-card {
      background: oklch(from var(--color-primary) l c h / 0.06);
      border: 1px solid oklch(from var(--color-primary) l c h / 0.25);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
      margin-bottom: var(--space-2);
      font-size: var(--text-sm);
      color: var(--color-text);
    }
    .prompt-card strong { color: var(--color-primary); }
    .prompt-card .prompt-actions { margin-top: var(--space-2); display: flex; gap: var(--space-2); flex-wrap: wrap; }
    .prompt-card button {
      padding: 4px 10px; font-size: var(--text-xs); font-weight: 600;
      border-radius: var(--radius-md);
    }

    .tool-launch-grid {
      display: flex; flex-wrap: wrap;
      gap: var(--space-2);
    }
    .tool-launch-row {
      display: inline-flex; align-items: stretch; gap: 0;
      white-space: nowrap; flex-shrink: 0;
    }
    .tool-launch-btn {
      padding: var(--space-2) var(--space-3);
      background: var(--color-surface-offset); border: 1px solid var(--color-border);
      border-radius: var(--radius-md); font-size: var(--text-xs); font-weight: 600;
      text-decoration: none; color: var(--color-text); text-align: center;
      white-space: nowrap;
      transition: background var(--transition-interactive);
    }
    .tool-launch-btn:hover { background: var(--color-primary-bg); color: var(--color-primary); border-color: var(--color-primary); }

    .quick-actions { display: flex; gap: var(--space-2); flex-wrap: wrap; margin-top: 8px; }
    .quick-actions button {
      padding: var(--space-2) var(--space-4); border-radius: var(--radius-md);
      font-size: var(--text-sm); font-weight: 600;
    }
    .quick-actions .primary { background: var(--color-primary); color: white; border: none; }
    .quick-actions .ghost { background: transparent; border: 1px solid var(--color-border); color: var(--color-text); }
    .quick-actions .danger { background: var(--color-error); color: white; border: none; }

    /* ── New-visit form helpers (match registro.html) ─────────── */
    .np-label { display:block; font-size:var(--text-xs); color:var(--color-text-muted); font-weight:600; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:4px; }
    .np-row-2 { display:grid; grid-template-columns:1fr 1fr; gap:var(--space-3); margin-top:var(--space-3); }
    @media (max-width: 700px) { .np-row-2 { grid-template-columns: 1fr; } }

    /* Safety-first checkbox highlight for depression/anxiety visits */
    .safety-first-box {
      background: oklch(from var(--color-error) l c h / 0.08);
      border: 1px solid oklch(from var(--color-error) l c h / 0.4);
      border-radius: var(--radius-md);
      padding: var(--space-3);
      margin-bottom: var(--space-3);
    }
    .safety-first-box label {
      display: flex; align-items: center; gap: var(--space-2);
      font-weight: 700; color: var(--color-error); cursor: pointer;
    }
    .safety-first-box .safety-note {
      font-size: var(--text-xs); color: var(--color-text-muted); margin-top: 6px;
    }

    /* Last-visit nudge banner on patient page */
    .last-visit-nudge {
      background: var(--color-primary-bg); color: var(--color-primary);
      border-radius: var(--radius-md); padding: var(--space-2) var(--space-3);
      font-size: var(--text-xs); font-weight: 600;
      margin-bottom: var(--space-3); display: inline-block;
    }

    /* How-to card (shared) */
    .howto-card {
      background: var(--color-primary-bg);
      border: 1px solid oklch(from var(--color-primary) l c h / 0.3);
      border-radius: var(--radius-lg);
      margin-bottom: 8px;
      overflow: hidden;
    }
    .howto-card summary {
      cursor: pointer; padding: 6px 12px;
      font-weight: 600; font-size: 12.5px; color: var(--color-primary);
      display: flex; align-items: center; gap: var(--space-2);
      list-style: none; user-select: none;
    }
    .howto-card summary::-webkit-details-marker { display: none; }
    .howto-card .howto-chevron { margin-left: auto; transition: transform 0.15s; font-size: 0.9em; }
    .howto-card[open] .howto-chevron { transform: rotate(180deg); }
    .howto-card .howto-body {
      padding: 0 var(--space-4) var(--space-4) var(--space-4);
      color: var(--color-text); font-size: var(--text-sm); line-height: 1.55;
    }
    .howto-card .howto-body ul { margin: 0; padding-left: var(--space-5); }
    .howto-card .howto-body li { margin-bottom: var(--space-2); }
    .howto-card .howto-body strong { color: var(--color-primary); }

    /* ── How-to sub-sections ── */
    .howto-sub { margin-top: var(--space-2); border-top: 1px solid var(--color-border); padding-top: var(--space-2); }
    .howto-sub:first-child { border-top: none; padding-top: 0; }
    .howto-sub summary { font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; list-style: none; color: var(--color-text); }
    .howto-sub summary::-webkit-details-marker { display: none; }
    .howto-sub[open] .howto-chevron { transform: rotate(180deg); }
    .howto-sub .howto-chevron { margin-left: auto; transition: transform 0.15s; font-size: 0.85em; }
    .howto-sub ul { margin: var(--space-2) 0 0 0; padding-left: var(--space-4); }
    .howto-sub li { margin-bottom: var(--space-1); font-size: 12px; line-height: 1.5; }

    /* Toast host (shared) */
    #regToastHost {
      position: fixed; bottom: var(--space-5); right: var(--space-5);
      display: flex; flex-direction: column; gap: var(--space-2);
      z-index: 500; pointer-events: none;
    }
    #regToastHost .reg-toast {
      pointer-events: auto;
      background: var(--color-surface); color: var(--color-text);
      border: 1px solid var(--color-border);
      border-left: 4px solid var(--color-primary);
      border-radius: var(--radius-md);
      padding: var(--space-3) var(--space-4);
      box-shadow: var(--shadow-lg);
      font-size: var(--text-sm); max-width: 380px;
      display: flex; align-items: center; gap: var(--space-3);
    }
    #regToastHost .reg-toast.toast-success { border-left-color: var(--color-success); }
    #regToastHost .reg-toast.toast-warn    { border-left-color: var(--color-warning); }
    #regToastHost .reg-toast.toast-error   { border-left-color: var(--color-error); }
    #regToastHost .reg-toast button {
      background: transparent; border: 1px solid var(--color-border);
      padding: 4px 10px; font-size: var(--text-xs); font-weight: 600;
      border-radius: var(--radius-sm); cursor: pointer; color: var(--color-text);
    }
  </style>
</head>
<body>

<div class="app-layout no-sidebar">
  <main class="main-content">

    <div class="topbar">
      <div style="display:flex; align-items:center; gap:var(--space-3);">
